- name: Deplay Laravel 
  hosts: server
  become: yes
  vars:
    deploy_path: /var/www/YI_MONIROM
    repo_url: https://github.com/HoklengPro/DevOps2026_2027_Lab-.git

    
  tasks:
    - name: Delete old repository
      file:
        path: "{{ deploy_path }}"
        state: absent
    - name: Add git safe directory
      command: "git config --global --add safe.directory {{ deploy_path }}"

    - name: clone repo
      git:
        repo: "{{ repo_url }}"
        dest: "{{ deploy_path }}"
        force: yes
    - name: Install compposer
      command: composer install --no-dev --no-interaction
      args:
        chdir: "{{ deploy_path}}"
      environment:
        COMPOSER_ALLOW_SUPERUSER: "1"
    - name: Copy .env file
      copy:
        src: "{{ deploy_path }}/.env.example"
        dest: "{{ deploy_path }}/.env"
        remote_src: yes
        force: no

    - name: Generate app
      command: php artisan key:generate
      args:
        chdir: "{{ deploy_path }}"
    
    - name: Install compoaser
      command: npm install 
      args:
        chdir: "{{ deploy_path }}"
      
    - name: build
      command: npm run build
      args:
        chdir: "{{ deploy_path }}"
    - name: Set permissions
      file:
        path: "{{ deploy_path }}"
        owner: www-data
        group: www-data
        recurse: yes
      
