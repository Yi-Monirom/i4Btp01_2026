- name: Deploy Laravel project YI_MONIROM
  hosts: server
  become: yes
  vars:
    deploy_path: /var/www/YI_MONIROM
    repo_url: https://github.com/Yi-Monirom/i4Btp01_2026.git
    server_name: 178.128.93.188

  tasks:
    - name: Install PHP 8.4 and required extensions
      apt:
        name:
          - php8.4
          - php8.4-cli
          - php8.4-fpm
          - php8.4-mbstring
          - php8.4-xml
          - php8.4-curl
          - php8.4-bcmath
          - php8.4-zip
          - php8.4-sqlite3
        state: present
        update_cache: yes

    - name: Delete old repository
      file:
        path: "{{ deploy_path }}"
        state: absent

    - name: Clone repository
      git:
        repo: "{{ repo_url }}"
        dest: "{{ deploy_path }}"
        force: yes

    - name: Add git safe directory
      command: "git config --global --add safe.directory {{ deploy_path }}"

    - name: Create SQLite database file
      file:
        path: "{{ deploy_path }}/database/database.sqlite"
        state: touch
        owner: www-data
        group: www-data
        mode: '0664'

    - name: Copy .env file
      copy:
        src: "{{ deploy_path }}/.env.example"
        dest: "{{ deploy_path }}/.env"
        remote_src: yes
        force: no

    - name: Install Composer dependencies
      command: /usr/bin/php8.4 /usr/local/bin/composer install --no-dev --no-interaction
      args:
        chdir: "{{ deploy_path }}"
      environment:
        COMPOSER_ALLOW_SUPERUSER: "1"

    - name: Generate Laravel key
      command: php8.4 artisan key:generate --force
      args:
        chdir: "{{ deploy_path }}"

    - name: Install Node modules
      command: npm install
      args:
        chdir: "{{ deploy_path }}"

    - name: Build assets
      command: npm run build
      args:
        chdir: "{{ deploy_path }}"

    - name: Set permissions
      file:
        path: "{{ deploy_path }}"
        owner: www-data
        group: www-data
        recurse: yes