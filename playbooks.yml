- name: Deploy Laravel project YI_MONIROM
  hosts: server
  become: yes
  vars:
    deploy_path: /var/www/YI_MONIROM
    repo_url: https://github.com/Yi-Monirom/i4Btp01_2026.git
    server_name: 178.128.93.188  # change to your IP or domain

  tasks:
    # 1️⃣ Remove old repo
    - name: Delete old repository
      file:
        path: "{{ deploy_path }}"
        state: absent

    # 2️⃣ Clone repository
    - name: Clone repository
      git:
        repo: "{{ repo_url }}"
        dest: "{{ deploy_path }}"
        force: yes

    # 3️⃣ Git safe directory
    - name: Add git safe directory
      command: "git config --global --add safe.directory {{ deploy_path }}"

    # 4️⃣ Composer dependencies
    - name: Install Composer dependencies
      command: composer install --no-dev --no-interaction
      args:
        chdir: "{{ deploy_path }}"
      environment:
        COMPOSER_ALLOW_SUPERUSER: "1"

    # 5️⃣ Copy .env
    - name: Copy .env file
      copy:
        src: "{{ deploy_path }}/.env.example"
        dest: "{{ deploy_path }}/.env"
        remote_src: yes
        force: no

    # 6️⃣ Generate Laravel key
    - name: Generate Laravel key
      command: php artisan key:generate --force
      args:
        chdir: "{{ deploy_path }}"

    # 7️⃣ Install Node modules
    - name: Install Node modules
      command: npm install
      args:
        chdir: "{{ deploy_path }}"

    # 8️⃣ Build assets
    - name: Build assets
      command: npm run build
      args:
        chdir: "{{ deploy_path }}"

    # 9️⃣ Set permissions
    - name: Set permissions
      file:
        path: "{{ deploy_path }}"
        owner: www-data
        group: www-data
        recurse: yes

    # 🔟 Configure Nginx for Laravel subfolder
    - name: Configure Nginx for YI_MONIROM
      copy:
        dest: /etc/nginx/sites-available/YI_MONIROM
        content: |
          server {
              listen 80;
              server_name {{ server_name }};

              root {{ deploy_path }}/public;
              index index.php index.html;

              location /YI_MONIROM/ {
                  alias {{ deploy_path }}/public/;
                  index index.php;
                  try_files $uri $uri/ /index.php?$query_string;

                  location ~ ^/YI_MONIROM/(.+\.php)$ {
                      alias {{ deploy_path }}/public/$1;
                      fastcgi_pass unix:/run/php/php8.4-fpm.sock;
                      fastcgi_index index.php;
                      include fastcgi_params;
                      fastcgi_param SCRIPT_FILENAME {{ deploy_path }}/public/$1;
                  }
              }

              location ~ /\.ht {
                  deny all;
              }
          }
      notify:
        - Enable Nginx site

  handlers:
  - name: Enable Nginx site
    block:
      - name: Link site to sites-enabled
        file:
          src: /etc/nginx/sites-available/YI_MONIROM
          dest: /etc/nginx/sites-enabled/YI_MONIROM
          state: link
          force: yes

      - name: Test Nginx configuration
        command: nginx -t

      - name: Reload Nginx
        service:
          name: nginx
          state: reloaded